<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="A heartfelt apology, just for you, Istabraq. Please read this with an open heart.">
    <link rel="icon" href="image/logo.png" type="image/png">
    <title>❤️ For Istabraq</title>


    <link rel="stylesheet" href="css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>

    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src="image/happy3.gif" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />

        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>

        <div class="firework-container" id="fireworkContainer"></div>

        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button id="musicControl">
            <span id="musicIcon">▶</span>
        </button>
        <button class="settings-button" id="settingsButton" style="display: none;">⚙</button>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>⚙️ Settings</h2>
                    <span class="close">×</span>
                </div>
                <div class="modal-body">
                    <p style="text-align:center; color:#666;">You can edit texts and images directly in the JS files to keep the site fully standalone.</p>
                    <button id="applySettings" class="apply-settings-btn">Save & Apply</button>
                </div>
            </div>
        </div>

        <audio id="birthdayAudio" loop>
            <source src="./music/Butterfly-chosic.com_.mp3" type="audio/mpeg">
        </audio>

        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="image/screen.png" alt="Rotate Phone">
            </div>
        </div>

        <button id="fullscreenBtn" style="position: fixed; bottom: 20px; right: 20px; z-index: 990010; padding: 10px; border-radius: 8px; border: none; background: #222; color: #fff; cursor: pointer;">
            <img style="width: 20px;" src="image/full.png" alt="Full Screen">
        </button>
    </div>

    <script>
    // Stub for socket.io — not needed in standalone mode
    window.io = function() {
        return {
            on: function() {},
            off: function() {},
            emit: function() {},
            disconnect: function() {}
        };
    };
    </script>

    <script src="lang.js"></script>
    <script src="jscp/settings.js"></script>
    <script src="jscp/main.js"></script>
    <script src="jscp/ui.js"></script>

</body>
</html>
